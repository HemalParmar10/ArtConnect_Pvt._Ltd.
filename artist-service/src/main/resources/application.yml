server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  application:
    name: artist-service

  datasource:
    url: jdbc:mysql://localhost:3306/artist_service_db
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

# ✅ JWT (MUST MATCH across services)
jwt:
  secret: my-super-secret-key-which-is-at-least-32-bytes-long
